<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安全隐患检查自动化系统 - 管理端</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --primary:#6366f1;--primary-hover:#4f46e5;--primary-light:#eef2ff;--primary-glow:rgba(99,102,241,.18);
    --success:#10b981;--success-light:#ecfdf5;
    --warning:#f59e0b;--warning-light:#fffbeb;
    --danger:#ef4444;--danger-light:#fef2f2;
    --surface:#ffffff;--bg:#f4f6fb;
    --text:#0f172a;--text2:#475569;--text3:#94a3b8;
    --border:#e2e8f0;--border-light:#f1f5f9;
    --radius:14px;--radius-sm:10px;
    --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
    --shadow-lg:0 4px 24px rgba(0,0,0,.06);
    --shadow-xl:0 8px 40px rgba(0,0,0,.1);
  }
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}

  /* Sidebar */
  .sidebar{width:260px;background:linear-gradient(180deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
  .sidebar::before{content:'';position:absolute;top:-60%;right:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 60%);pointer-events:none}
  .sidebar-logo{padding:28px 24px 20px;position:relative}
  .sidebar-logo h1{color:#fff;font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px;letter-spacing:-.3px}
  .sidebar-logo h1 .logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#818cf8,#6366f1);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(99,102,241,.4)}
  .sidebar-logo h1 .logo-icon svg{width:20px;height:20px}
  .sidebar-logo p{color:rgba(255,255,255,.35);font-size:11px;margin-top:4px;margin-left:46px;letter-spacing:.5px}
  .sidebar-nav{flex:1;padding:8px 12px}
  .sidebar-item{padding:11px 16px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;margin-bottom:2px;position:relative}
  .sidebar-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
  .sidebar-item.active{background:rgba(99,102,241,.2);color:#fff;box-shadow:inset 0 0 0 1px rgba(99,102,241,.2)}
  .sidebar-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:#818cf8}
  .sidebar-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7}
  .sidebar-item.active svg{opacity:1}
  .sidebar-footer{padding:16px;margin:12px;border-radius:var(--radius-sm);background:rgba(255,255,255,.05);backdrop-filter:blur(8px)}
  .sidebar-footer .user{display:flex;align-items:center;gap:10px}
  .sidebar-footer .avatar{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#818cf8,#a78bfa);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
  .sidebar-footer .name{color:rgba(255,255,255,.9);font-size:13px;font-weight:600}
  .sidebar-footer .email{color:rgba(255,255,255,.35);font-size:11px}

  /* Main */
  .main{flex:1;padding:28px 32px;overflow-y:auto;height:100vh}
  .page-header{margin-bottom:28px}
  .page-header h2{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px}
  .page-header p{color:var(--text3);font-size:14px;margin-top:4px}

  /* Cards */
  .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border-light);transition:all .25s}
  .card:hover{box-shadow:var(--shadow-lg)}

  /* Stat Cards */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat-card{border-radius:var(--radius);padding:22px;position:relative;overflow:hidden;border:none}
  .stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.15}
  .stat-card.blue{background:linear-gradient(135deg,#eef2ff,#e0e7ff);color:#3730a3}
  .stat-card.blue::before{background:#6366f1}
  .stat-card.green{background:linear-gradient(135deg,#ecfdf5,#d1fae5);color:#065f46}
  .stat-card.green::before{background:#10b981}
  .stat-card.amber{background:linear-gradient(135deg,#fffbeb,#fef3c7);color:#92400e}
  .stat-card.amber::before{background:#f59e0b}
  .stat-card.rose{background:linear-gradient(135deg,#fff1f2,#fecdd3);color:#9f1239}
  .stat-card.rose::before{background:#f43f5e}
  .stat-card .stat-label{font-size:13px;font-weight:500;opacity:.7;margin-bottom:8px}
  .stat-card .stat-num{font-size:36px;font-weight:800;line-height:1;letter-spacing:-1px}
  .stat-card .stat-sub{font-size:12px;opacity:.5;margin-top:6px}
  .stat-card .stat-icon{position:absolute;top:20px;right:20px;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.6);backdrop-filter:blur(4px)}
  .stat-card .stat-icon svg{width:20px;height:20px}

  /* Progress */
  .progress{height:6px;border-radius:3px;background:var(--border);overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),#a78bfa);transition:width .6s cubic-bezier(.4,0,.2,1)}

  /* Badge */
  .badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.2px;display:inline-flex;align-items:center;gap:4px}
  .badge::before{content:'';width:6px;height:6px;border-radius:50%}
  .badge-done{background:#ecfdf5;color:#059669}.badge-done::before{background:#10b981}
  .badge-progress{background:#eef2ff;color:#4f46e5}.badge-progress::before{background:#6366f1}
  .badge-pending{background:#fffbeb;color:#b45309}.badge-pending::before{background:#f59e0b}

  /* Buttons */
  .btn{padding:9px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px;letter-spacing:.1px}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3)}
  .btn-primary:hover{background:var(--primary-hover);box-shadow:0 4px 14px rgba(99,102,241,.4);transform:translateY(-1px)}
  .btn-success{background:var(--success);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.3)}
  .btn-success:hover{background:#059669;transform:translateY(-1px)}
  .btn-outline{background:var(--surface);color:var(--text2);border:1.5px solid var(--border)}
  .btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
  .btn-ghost{background:transparent;color:var(--primary);padding:9px 12px}
  .btn-ghost:hover{background:var(--primary-light)}

  /* Table */
  table{width:100%;border-collapse:separate;border-spacing:0}
  thead th{font-size:12px;font-weight:600;color:var(--text3);text-align:left;padding:12px 16px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
  tbody td{padding:14px 16px;font-size:13.5px;border-bottom:1px solid var(--border-light)}
  tbody tr{transition:background .15s}
  tbody tr:hover{background:#f8fafc}
  tbody tr:last-child td{border-bottom:none}

  /* Upload Zone */
  .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:56px 32px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
  .upload-zone::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.02),rgba(99,102,241,.06));opacity:0;transition:opacity .3s}
  .upload-zone:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.08)}
  .upload-zone:hover::before{opacity:1}
  .upload-zone .upload-icon{width:72px;height:72px;margin:0 auto 20px;border-radius:20px;background:linear-gradient(135deg,var(--primary-light),#ddd6fe);display:flex;align-items:center;justify-content:center}
  .upload-zone .upload-icon svg{width:32px;height:32px;color:var(--primary)}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
  .modal{background:var(--surface);border-radius:20px;max-width:920px;width:92%;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:scaleIn .25s cubic-bezier(.4,0,.2,1)}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

  /* Tab */
  .tabs{display:flex;gap:4px;padding:4px;background:var(--border-light);border-radius:var(--radius-sm);width:fit-content;margin-bottom:20px}
  .tab{padding:8px 20px;cursor:pointer;border-radius:8px;color:var(--text3);font-weight:600;font-size:13px;transition:all .2s}
  .tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .tab:hover:not(.active){color:var(--text2)}

  /* Photo Grid */
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .photo-item{aspect-ratio:4/3;border-radius:var(--radius-sm);overflow:hidden;position:relative;cursor:pointer;transition:transform .2s}
  .photo-item:hover{transform:scale(1.03)}
  .photo-item .inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:500}
  .photo-item .photo-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.65));color:#fff;padding:6px 10px;font-size:11px;font-weight:500}

  /* Toast */
  .toast{position:fixed;top:28px;right:28px;z-index:100;padding:14px 24px;border-radius:var(--radius-sm);color:#fff;font-weight:600;font-size:14px;box-shadow:var(--shadow-xl);animation:toastIn .35s cubic-bezier(.4,0,.2,1)}
  @keyframes toastIn{from{opacity:0;transform:translateX(40px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}

  /* Result stats */
  .result-stat{border-radius:var(--radius-sm);padding:16px;text-align:center;position:relative;overflow:hidden}
  .result-stat .rs-num{font-size:28px;font-weight:800;letter-spacing:-1px}
  .result-stat .rs-label{font-size:11px;font-weight:500;opacity:.6;margin-top:2px}

  /* Circular Progress */
  .circle-stat{position:relative;width:120px;height:120px;margin:0 auto}
  .circle-stat svg{transform:rotate(-90deg)}
  .circle-stat .circle-bg{fill:none;stroke:var(--border);stroke-width:8}
  .circle-stat .circle-fill{fill:none;stroke:url(#circleGrad);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
  .circle-stat .circle-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .circle-stat .circle-num{font-size:28px;font-weight:800;color:var(--primary);letter-spacing:-1px}
  .circle-stat .circle-label{font-size:11px;color:var(--text3);font-weight:500}

  /* Animated counter */
  @keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .animate-in{animation:countUp .5s ease both}

  .grid-2{display:grid;grid-template-columns:2fr 1fr;gap:16px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

  /* File row */
  .file-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--radius-sm);transition:background .15s}
  .file-row:hover{background:var(--border-light)}
  .file-row .file-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .file-row .file-info{flex:1;min-width:0}
  .file-row .file-name{font-size:13.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .file-row .file-meta{font-size:12px;color:var(--text3);display:flex;gap:12px;margin-top:2px}
</style>
</head>

<div style="display:flex">

      <div class="user">

      </div>
    </div>
  </div>

  <div class="main" id="mainContent"></div>
</div>

<script>
const MP=[
  {id:1,name:"湾区激光谷大厦项目",street:"观湖街道",address:"观城社区横坑水库西侧A909-1060宗地",contact:"李红",phone:"15937299381",category:"建筑施工",buildUnit:"深圳市杰普特光电股份有限公司",constructUnit:"广东电白建设集团有限公司",superviseUnit:"深圳市城建监理有限公司",checkDate:"2025-03-05",status:"done",hc:4,uc:4,
    hazards:[{seq:1,type:"设备设施",desc:"脚手架横杆端头突出部分低于10cm",risk:"坍塌",cat:"一般隐患",rs:"已整改",hp:1,rp:1},{seq:2,type:"消防安全",desc:"临时用电线路未穿管保护",risk:"火灾",cat:"一般隐患",rs:"已整改",hp:1,rp:1},{seq:3,type:"安全防护",desc:"基坑边缘防护栏杆缺失",risk:"高处坠落",cat:"重大隐患",rs:"已整改",hp:1,rp:1},{seq:4,type:"安全管理",desc:"施工现场未设置安全警示标志",risk:"人员伤害",cat:"一般隐患",rs:"已整改",hp:1,rp:1}]},
  {id:2,name:"小象超市冷库",street:"龙华街道",address:"共和农贸批发市场G15-G17位",contact:"黄浩磊",phone:"15012775845",category:"冷库",buildUnit:"",constructUnit:"",superviseUnit:"",checkDate:"2025-03-02",status:"done",hc:5,uc:5,
    hazards:[{seq:1,type:"消防安全",desc:"货物占用安全疏散通道",risk:"疏散困难",cat:"一般隐患",rs:"已整改",hp:1,rp:1},{seq:2,type:"消防安全",desc:"消火栓、灭火器被遮挡",risk:"灭火延误",cat:"一般隐患",rs:"已整改",hp:1,rp:1},{seq:3,type:"安全管理",desc:"未张贴风险告知卡",risk:"人员不知风险",cat:"一般隐患",rs:"已整改",hp:1,rp:1},{seq:4,type:"电气安全",desc:"电线套管不全",risk:"触电/火灾",cat:"一般隐患",rs:"已整改",hp:1,rp:1},{seq:5,type:"消防安全",desc:"消火栓消防水带密封圈老化脱落",risk:"消防失效",cat:"一般隐患",rs:"已整改",hp:1,rp:1}]},
  {id:3,name:"锦绣科学园二期项目",street:"观湖街道",address:"观城社区大和路南侧A816-0175宗地",contact:"张明",phone:"13800138003",category:"建筑施工",buildUnit:"深圳市锦绣科学园有限公司",constructUnit:"中建三局",superviseUnit:"深圳市华鹏监理有限公司",checkDate:"2025-03-10",status:"progress",hc:6,uc:3,
    hazards:[{seq:1,type:"设备设施",desc:"塔吊基础螺栓松动",risk:"坍塌",cat:"重大隐患",rs:"已整改",hp:1,rp:1},{seq:2,type:"消防安全",desc:"施工材料堆放杂乱",risk:"火灾",cat:"一般隐患",rs:"已整改",hp:1,rp:1},{seq:3,type:"安全防护",desc:"临边防护不到位",risk:"高处坠落",cat:"一般隐患",rs:"已整改",hp:1,rp:1},{seq:4,type:"安全管理",desc:"工人未佩戴安全帽",risk:"物体打击",cat:"一般隐患",rs:"待整改",hp:1,rp:0},{seq:5,type:"电气安全",desc:"配电箱门未关闭",risk:"触电",cat:"一般隐患",rs:"待整改",hp:1,rp:0},{seq:6,type:"设备设施",desc:"脚手架连墙件不足",risk:"坍塌",cat:"重大隐患",rs:"待整改",hp:1,rp:0}]},

let curPage='dashboard';

function switchPage(p){
  curPage=p;
  document.querySelectorAll('.sidebar-item').forEach((el,i)=>el.classList.toggle('active',['dashboard','upload','projects'][i]===p));

    </div>`;
}

function swTab(el,id){el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');const m=el.closest('.modal');m.querySelectorAll('[id^="hz-"],[id^="ph-"]').forEach(d=>d.style.display='none');document.getElementById(id).style.display='block'}
function closeModal(){document.getElementById('projectModal').style.display='none'}
function simUpload(){const z=document.getElementById('uploadZone');z.innerHTML='<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:20px"><svg style="width:24px;height:24px;color:var(--primary);animation:spin 1s linear infinite" fill="none" viewBox="0 0 24 24"><circle opacity=".25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path opacity=".75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span style="font-size:15px;font-weight:600;color:var(--primary)">正在解析 Excel 文件...</span></div>';setTimeout(()=>{z.innerHTML='<div style="padding:20px;text-align:center"><svg style="width:48px;height:48px;color:var(--success)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p style="font-size:15px;font-weight:600;color:var(--success);margin-top:8px">解析完成</p></div>';document.getElementById('uploadResult').style.display='block'},2000)}
function simGen(id){const p=MP.find(x=>x.id===id);showToast('正在生成 '+p.name+' ...','info');setTimeout(()=>showToast(p.name+' 文档已生成','success'),1500)}
function showToast(m,t){const el=document.getElementById('toast');el.textContent=m;el.style.background=t==='success'?'var(--success)':t==='info'?'var(--primary)':'var(--danger)';el.style.display='block';setTimeout(()=>el.style.display='none',3000)}
function batchGen(){const c=document.querySelectorAll('.pcb:checked');if(!c.length){showToast('请先选择项目','error');return}showToast('批量生成 '+c.length+' 份...','info');setTimeout(()=>showToast(c.length+' 份文档 ZIP 下载中','success'),2000)}

render();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
